<!DOCTYPE html>
<html lang="eng">
    <head>
        <meta charset="UTF-8">
        <title>svg practise</title>
    </head>
    <body>
        <header>
            <h1>im am practising svg icons</h1>
        </header>
        <main>
          <section>
            <h1>line</h1>
            <svg width ="200" height ="200">
                <line 
                  x1 = "20"
                  y1 ="50"
                  x2 = "60"
                  y2 = "10"
                 stroke = "green"
                 stroke-width ="5"
                /> 
            </svg>
          </section>
           
          <section>
            <h1>rectangle</h1>
            <svg width = "200" height ="200">
                <rect 
                   x ="60"
                   y = "100"
                   width = "70"
                   height ="60"
                   fill = "none"
                   stroke = "green"
                   stroke-width ="5"
                />
            </svg>
            
          </section>
          <section>
            <h1>circle</h1>
            <svg width ="200" height ="200">
                <circle
                  cx ="50"
                  cy ="60"
                  r ="20"
                  rx="50"
                  ry ="50"
                  fill ="none"
                  stroke ="green"
                  stroke-width ="6"
                />

                  
            </svg>
            
          </section>
          <section>
            <h2>ellipse</h2>
            <svg width ="200"  height ="200">
                <ellipse
                  cx="80"
                  cy ="100"
                  rx = "16"
                  ry ="70"
                  fill ="none"
                  stroke ="purple"
                  stroke-fill ="5"
                />
            </svg>
          </section>
          <section>
            <h2>
                polygon
            </h2>
            <svg width = "200" height ="200">
                <polygon
                   points ="
                    60,100
                    100,180
                    119, 160
                    180,200
                    "
                />
            </svg>
          </section>
        </main>
    </body>
</html>
